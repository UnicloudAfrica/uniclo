<!DOCTYPE html>
<html lang="en">

<head>
    <!-- ConveyThis public translation key (non-secret, safe for client).
         GAP-035: migrated from a hardcoded literal to `VITE_CONVEYTHIS_KEY`
         so each environment (prod, staging, dev) can bind its own account
         without a source-code edit. The script short-circuits when the
         env var is unset — e.g. in local dev where translation is off. -->
    <script
        src="https://cdn.conveythis.com/javascript/conveythis-initializer.js"
        integrity="sha384-REPLACE_WITH_ACTUAL_HASH"
        crossorigin="anonymous"></script>
    <script type="text/javascript">
        document.addEventListener("DOMContentLoaded", function () {
            // Vite replaces `%VITE_CONVEYTHIS_KEY%` at build time. Empty
            // string means the env var was unset — skip initialisation.
            var conveyKey = "%VITE_CONVEYTHIS_KEY%";
            if (!conveyKey || conveyKey === "%VITE_CONVEYTHIS_KEY%") {
                return;
            }
            if (typeof globalThis.window.ConveyThis_Initializer === "object" && globalThis.window.ConveyThis_Initializer?.init) {
                globalThis.window.ConveyThis_Initializer.init({
                    api_key: conveyKey,
                });
            } else {
                console.warn("ConveyThis initializer script failed to load.");
            }
        });
    </script>
    <meta charset="utf-8" />
    <link rel="icon" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="One Cloud One Africa" />
    <link rel="apple-touch-icon" href="/logo.svg" />

    <!-- Google Fonts - Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <title>UniCloud-Africa</title>
</head>

<body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script src="//code.tidio.co/trbn6ytlyhltbigw66s6ysarej0k5vdy.js" async></script>
</body>

</html>
